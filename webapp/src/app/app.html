<header class="toolbar">
  <button
    type="button"
    class="toolbar-button toolbar-button-text"
    [class.toolbar-button-active]="activeReportMode === 'rag'"
    (click)="loadReport('rag')"
  >
    RAG Report
  </button>
  <button
    type="button"
    class="toolbar-button toolbar-button-text"
    [class.toolbar-button-active]="activeReportMode === 'non-rag'"
    (click)="loadReport('non-rag')"
  >
    Non-RAG Report
  </button>
</header>

<main class="page">
  @if (isLoading) {
    <section class="status-panel">Loading report...</section>
  } @else if (errorMessage) {
    <section class="status-panel status-panel-error">{{ errorMessage }}</section>
  } @else if (reportHtml) {
    <iframe
      #reportFrame
      class="report-frame"
      title="Community Voices report"
    ></iframe>
  } @else {
    <section class="status-panel">No report available.</section>
  }
</main>
