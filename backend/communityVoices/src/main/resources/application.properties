spring.application.name=communityVoices
logging.level.root=INFO
logging.level.com.sleeware.communityvoices=INFO
spring.data.redis.client-type=jedis
community-voices.jobs.scrape-community.fixed-delay=PT5h

# src/main/resources/application.properties
spring.ai.ollama.base-url=http://localhost:11434

# Optional, but usually make this explicit for RAG embeddings
spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.model=mxbai-embed-large

# Optional, if chat generation also uses Ollama
spring.ai.model.chat=ollama
spring.ai.ollama.chat.model=llama3.1

spring.ai.vectorstore.redis.index-name=community-voices-v2
spring.ai.vectorstore.redis.prefix=community-voices:
spring.ai.vectorstore.redis.initialize-schema=true
